# IMPORTANT: This is a TEMPLATE file
# In production, create actual secrets with:
#   oc create secret generic idea-workflow-secrets \
#     --from-literal=DATABASE_URL='postgresql://user:password@postgresql:5432/ideas' \
#     --from-literal=JWT_SECRET='your-secure-random-secret-minimum-32-characters' \
#     --from-literal=IDEAS_REPO_URL='git@github.com:org/ideas-repository.git' \
#     --from-literal=TEMPLATES_REPO_URL='git@github.com:org/idea-templates.git' \
#     -n idea-workflow

apiVersion: v1
kind: Secret
metadata:
  name: idea-workflow-secrets
  namespace: idea-workflow
  labels:
    app: idea-workflow
type: Opaque
stringData:
  # Database connection string
  # Format: postgresql://username:password@hostname:port/database
  DATABASE_URL: "postgresql://ideas:changeme@postgresql:5432/ideas"

  # JWT secret (MUST be changed in production)
  # Generate with: openssl rand -base64 48
  JWT_SECRET: "CHANGE_THIS_TO_A_SECURE_RANDOM_STRING_MINIMUM_32_CHARACTERS"

  # Git repository URLs
  # For SSH access, you'll need to mount SSH keys separately
  IDEAS_REPO_URL: "https://github.com/your-org/ideas-repository.git"
  TEMPLATES_REPO_URL: "https://github.com/your-org/idea-templates.git"
